id: relationship_profiles
name: Relationship Profiles
summary: Authenticated, user-owned relationship profile CRUD with localized and searchable namespaced STI-backed relationship type labels, JSONB-backed profile attributes for custom type metadata, sanitized discriminator params, contact details, Lexxy/Action Text rich notes, associated structured preference metadata, memory records with confidence/source/review metadata and automation guardrails, conversation recaps with approval-gated extraction, relationship timeline entries, relationship-type template fields, custom field values, important dates and milestones, desires and future ideas with fulfillment history, gift history and reactions, rich private notes, reusable tags, relationship groups, friendly slugs, discard-backed archive state, search, and filtering.
claim_globs:
  - claims/relationship_profiles/**/*.md
default_queries:
  - relationship profile owner scoped CRUD
  - relationship profiles search filter archive
  - contact details rich private notes structured preferences preference metadata
  - preference type category confidence learned date source notes
  - memory records source confidence status stale review automation approval revisions
  - conversation recaps timeline source links AI extraction approval gate
  - timeline entries relationship history manual system source record filtering
  - relationship type template fields custom field values
  - custom relationship type label profile attributes store accessor
  - important dates milestones recurrence planning prompts
  - desires wants future ideas fulfillment history suggestion contexts
  - gift history reactions vendors outcomes duplicate recommendation guardrails
  - independently managed gifts profile saves validation boundary
  - reusable relationship tags groups filtering
  - Lexxy Action Text relationship notes
