id: relationship_profiles
name: Relationship Profiles
summary: Authenticated, user-owned relationship profile CRUD with localized and searchable namespaced STI-backed relationship type labels, JSONB-backed profile attributes for custom type metadata, sanitized discriminator params, contact details, Lexxy/Action Text rich notes, associated structured preference metadata, relationship-type template fields, custom field values, important dates and milestones, rich private notes, reusable tags, relationship groups, friendly slugs, discard-backed archive state, search, and filtering.
claim_globs:
  - claims/relationship_profiles/**/*.md
default_queries:
  - relationship profile owner scoped CRUD
  - relationship profiles search filter archive
  - contact details rich private notes structured preferences preference metadata
  - preference type category confidence learned date source notes
  - relationship type template fields custom field values
  - custom relationship type label profile attributes store accessor
  - important dates milestones recurrence planning prompts
  - reusable relationship tags groups filtering
  - Lexxy Action Text relationship notes
watched_files:
  - app/models/user.rb
  - app/models/relationship_profile.rb
  - app/models/relationship_profiles/**/*.rb
  - app/models/contact_method.rb
  - app/models/relationship_note.rb
  - app/models/relationship_preference.rb
  - app/models/relationship_tag.rb
  - app/models/relationship_tagging.rb
  - app/models/relationship_group.rb
  - app/models/relationship_group_membership.rb
  - app/models/relationship_template.rb
  - app/models/template_field.rb
  - app/models/relationship_field_value.rb
  - app/models/important_date.rb
  - app/forms/relationship_profiles/**/*.rb
  - app/queries/relationship_profile/search_query.rb
  - app/controllers/relationship_profiles_controller.rb
  - app/controllers/onboarding_controller.rb
  - app/controllers/important_dates_controller.rb
  - app/policies/relationship_profile_policy.rb
  - app/policies/important_date_policy.rb
  - app/views/important_dates/**/*.erb
  - app/views/relationship_profiles/**/*.erb
  - app/views/onboarding/**/*.erb
  - app/javascript/controllers/relationship_template_fields_controller.js
  - config/routes.rb
  - config/locales/en.yml
  - config/locales/es.yml
  - db/migrate/*relationship*.rb
  - db/migrate/*important_date*.rb
  - db/migrate/*active_storage*.rb
  - db/migrate/*action_text*.rb
tags:
  - relationship_profiles
  - privacy
  - pundit
  - ransack
  - action_text
  - lexxy
  - important_dates
