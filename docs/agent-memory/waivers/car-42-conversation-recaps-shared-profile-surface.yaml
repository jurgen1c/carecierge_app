id: car_42_conversation_recaps_shared_profile_surface
status: active
reason: >
  CAR-42 introduces the durable relationship_profiles.conversation_recaps claim
  and updates relationship_profiles.timeline_entries because conversation
  recaps now create linked system timeline entries. The changed relationship
  profile model/controller/show files are shared surface wiring only; the older
  important-dates, preference-metadata, and profile-CRUD claims were reviewed
  and remain current without replacement or conflict.
files:
