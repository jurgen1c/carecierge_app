last_updated: "2026-06-24"
routes:
  root:
    controller: "welcome#index"
    system: authentication
  dashboard:
    controller: "dashboard#index"
    system: authentication
  admin_feature_flags:
    controller: "admin/feature_flags#index"
    system: feature_flags
  new_user_registration:
    controller: "devise/registrations#new"
    system: authentication
  new_user_session:
    controller: "devise/sessions#new"
    system: authentication
models:
  User:
    file: "app/models/user.rb"
    system: authentication
  FeatureFlag:
    file: "app/models/feature_flag.rb"
    system: feature_flags
  FeatureFlagAssignment:
    file: "app/models/feature_flag_assignment.rb"
    system: feature_flags
  FeatureFlagAuditEvent:
    file: "app/models/feature_flag_audit_event.rb"
    system: feature_flags
  RolloutGroup:
    file: "app/models/rollout_group.rb"
    system: feature_flags
capabilities:
  account_registration:
    route: "new_user_registration"
    system: authentication
  account_login:
    route: "new_user_session"
    system: authentication
  account_logout:
    route: "destroy_user_session"
    system: authentication
  feature_flag_decision:
    model: "FeatureFlag"
    system: feature_flags
  feature_flag_registry:
    route: "admin_feature_flags"
    system: feature_flags
