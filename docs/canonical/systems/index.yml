systems:
  authentication:
    status: implemented
    name: "Authentication"
    summary: "Devise-backed account registration, login, logout, confirmation, lockout, and Google OAuth account access."
    owners:
      - "Application"
    boundaries:
      - "Owns user account access and session lifecycle."
      - "Redirects authenticated users to the onboarding-ready dashboard."
      - "Does not own relationship profile onboarding beyond the post-login landing surface."
    source_files:
      - "app/models/user.rb"
      - "app/controllers/application_controller.rb"
      - "app/controllers/dashboard_controller.rb"
      - "app/controllers/welcome_controller.rb"
      - "app/controllers/users/omniauth_callbacks_controller.rb"
      - "app/views/devise/registrations/new.html.erb"
      - "app/views/devise/sessions/new.html.erb"
      - "config/routes.rb"
      - "config/initializers/devise.rb"
    spec_files:
      - "spec/system/user_access_flow_spec.rb"
      - "spec/models/user_spec.rb"
      - "spec/controllers/users/omniauth_callbacks_controller_spec.rb"
      - "spec/requests/localization_spec.rb"
  feature_flags:
    status: implemented
    name: "Feature Flags"
    summary: "Admin-visible, deterministic rollout controls for staged AI, automation, integration, marketplace, and other experimental capabilities."
    owners:
      - "Application"
    boundaries:
      - "Owns feature flag registry records, rollout groups, targeted assignments, audit-event records, and deterministic flag decisions."
      - "Allows feature decisions by global default, environment, rollout group, segment, account identifier, or user identifier."
      - "Exposes flag and rollout-group state only to authenticated admin users."
      - "Does not own the experimental product behavior protected by each flag."
    source_files:
      - "app/controllers/admin/feature_flags_controller.rb"
      - "app/models/feature_flag.rb"
      - "app/models/feature_flag_assignment.rb"
      - "app/models/feature_flag_audit_event.rb"
      - "app/models/feature_flags/context.rb"
      - "app/models/rollout_group.rb"
      - "app/policies/feature_flag_policy.rb"
      - "app/views/admin/feature_flags/index.html.erb"
      - "config/routes.rb"
    spec_files:
      - "spec/models/feature_flag_spec.rb"
      - "spec/requests/admin_feature_flags_spec.rb"
